<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="quiz-container">
    <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="question-header">
        <span id="questionCounter">Вопрос 1 из 10</span>
    </div>

    <div class="question-text" id="questionText"></div>

    <div class="options-container" id="optionsContainer"></div>

    <button class="next-btn" id="nextButton">Следующий вопрос</button>
    <button class="results-btn" id="resultsButton">Результаты</button>

    <div class="results-container" id="resultsContainer">
        <h2>Результаты</h2>
        <div class="final-score" id="finalScore"></div>
        <div class="answers-review" id="answersReview"></div>
        <button class="restart-btn" id="restartButton">Заново</button>
    </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
